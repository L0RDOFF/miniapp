<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Music Archive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #080808;
  --surface: #111;
  --surface2: #1a1a1a;
  --surface3: #242424;
  --accent: #c8f53a;
  --accent-glow: rgba(200,245,58,0.2);
  --text: #f0f0f0;
  --text2: #777;
  --text3: #3a3a3a;
  --radius: 14px;
  --radius-sm: 9px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

.header {
  position: sticky; top: 0; z-index: 200;
  background: rgba(8,8,8,0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.header-top {
  padding: 12px 16px 0;
  display: flex; align-items: center; gap: 10px;
}
.logo {
  font-family: 'Unbounded', sans-serif;
  font-size: 14px; font-weight: 800; letter-spacing: -0.3px; flex: 1;
}
.logo em { color: var(--accent); font-style: normal; }
.header-actions { display: flex; gap: 6px; }
.icon-btn {
  width: 34px; height: 34px; border-radius: 50%;
  background: var(--surface2); border: none;
  color: var(--text); font-size: 16px;
  cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.icon-btn:active { background: var(--surface3); }

.tabs-wrap {
  padding: 10px 16px;
  overflow-x: auto; scrollbar-width: none;
  display: flex; gap: 6px;
}
.tabs-wrap::-webkit-scrollbar { display: none; }
.tab {
  padding: 6px 14px; border-radius: 100px; border: none;
  font-size: 12px; font-weight: 600; font-family: 'Inter', sans-serif;
  white-space: nowrap; cursor: pointer;
  background: var(--surface2); color: var(--text2);
  transition: all 0.2s;
}
.tab.active { background: var(--accent); color: #000; }

.search-header {
  display: none; padding: 10px 16px;
  align-items: center; gap: 10px;
}
.search-header.active { display: flex; }
.back-btn-search {
  width: 34px; height: 34px; border-radius: 50%;
  background: var(--surface2); border: none;
  color: var(--text); font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.search-wrap {
  flex: 1; display: flex; align-items: center; gap: 8px;
  background: var(--surface2);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 100px; padding: 0 14px; height: 36px;
  transition: border-color 0.2s;
}
.search-wrap:focus-within { border-color: var(--accent); }
.search-input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text); font-size: 14px; font-family: 'Inter', sans-serif;
}
.search-input::placeholder { color: var(--text2); }
.search-clear {
  background: none; border: none; color: var(--text2);
  font-size: 15px; cursor: pointer; padding: 0; display: none;
}
.search-clear.visible { display: block; }

.content { padding: 12px 16px 40px; }

.section-title {
  font-family: 'Unbounded', sans-serif;
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.8px; text-transform: uppercase;
  color: var(--text2); margin: 18px 0 10px;
}
.section-title:first-child { margin-top: 4px; }

.hero {
  background: linear-gradient(135deg, #0f0f0f 0%, #141a00 100%);
  border-radius: var(--radius); padding: 20px 18px;
  border: 1px solid rgba(200,245,58,0.08);
  position: relative; overflow: hidden; margin-bottom: 4px;
}
.hero::after {
  content: ''; position: absolute; top: -30px; right: -30px;
  width: 120px; height: 120px;
  background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
  pointer-events: none;
}
.hero-label {
  font-size: 10px; font-weight: 600; color: var(--accent);
  letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 6px;
}
.hero-title {
  font-family: 'Unbounded', sans-serif;
  font-size: 20px; font-weight: 800; line-height: 1.2; margin-bottom: 4px;
}
.hero-sub { font-size: 12px; color: var(--text2); }

.playlists-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 8px; margin-bottom: 4px;
}
.playlist-card {
  background: var(--surface); border-radius: var(--radius);
  overflow: hidden; cursor: pointer;
  border: 1px solid rgba(255,255,255,0.04);
  transition: transform 0.15s, border-color 0.2s;
  aspect-ratio: 1; position: relative;
  display: flex; align-items: flex-end;
}
.playlist-card:active { transform: scale(0.97); border-color: rgba(200,245,58,0.25); }
.playlist-card-bg {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, #141414, #1a1a1a);
}
.playlist-card-bg img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
.playlist-card-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, transparent 60%);
}
.playlist-card-info { position: relative; z-index: 1; padding: 12px; }
.playlist-name { font-size: 13px; font-weight: 700; line-height: 1.3; margin-bottom: 2px; }
.playlist-count { font-size: 10px; color: var(--text2); }

.track-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.03); cursor: pointer;
}
.track-item:last-child { border-bottom: none; }
.track-item:active .track-title { color: var(--accent); }
.track-item.playing .track-title { color: var(--accent); }
.track-num { width: 18px; text-align: center; font-size: 11px; color: var(--text3); flex-shrink: 0; }
.track-cover {
  width: 42px; height: 42px; border-radius: var(--radius-sm);
  background: var(--surface2); flex-shrink: 0;
  overflow: hidden; display: flex; align-items: center; justify-content: center;
}
.track-cover img { width: 100%; height: 100%; object-fit: cover; }
.track-info { flex: 1; min-width: 0; }
.track-artist { font-size: 11px; color: var(--text2); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.track-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color 0.15s; }
.track-badge { font-size: 10px; color: var(--text3); margin-top: 1px; }
.track-fav { background: none; border: none; font-size: 14px; cursor: pointer; padding: 6px; opacity: 0.4; transition: opacity 0.2s, transform 0.15s; flex-shrink: 0; }
.track-fav.on { opacity: 1; }
.track-fav:active { transform: scale(1.3); }

.detail-view { display: none; }
.detail-view.show { display: block; }
.detail-header {
  display: flex; align-items: center; gap: 10px; padding: 12px 16px;
  position: sticky; top: 56px; z-index: 100;
  background: rgba(8,8,8,0.95); backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.back-btn {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--surface2); border: none; color: var(--text);
  font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.detail-title { font-family: 'Unbounded', sans-serif; font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.detail-hero { padding: 16px 16px 0; display: flex; gap: 14px; align-items: flex-end; margin-bottom: 14px; }
.detail-cover {
  width: 100px; height: 100px; border-radius: var(--radius);
  background: var(--surface2); flex-shrink: 0; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.detail-cover img { width: 100%; height: 100%; object-fit: cover; }
.detail-name { font-family: 'Unbounded', sans-serif; font-size: 16px; font-weight: 800; margin-bottom: 4px; line-height: 1.2; }
.detail-desc { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
.detail-count { font-size: 11px; color: var(--text3); }
.detail-btns { display: flex; gap: 8px; padding: 0 16px 14px; }
.btn-primary { flex: 1; height: 40px; border-radius: 100px; background: var(--accent); border: none; color: #000; font-size: 13px; font-weight: 700; font-family: 'Inter', sans-serif; cursor: pointer; }
.btn-secondary { width: 40px; height: 40px; border-radius: 50%; background: var(--surface2); border: none; color: var(--text); font-size: 16px; cursor: pointer; }

.search-view { display: none; }
.search-view.show { display: block; }
.search-hint { text-align: center; padding: 60px 20px; color: var(--text3); font-size: 13px; }

.loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 12px; color: var(--text3); font-size: 12px; }
.spinner { width: 24px; height: 24px; border: 2px solid var(--surface3); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty { text-align: center; padding: 60px 20px; color: var(--text3); }
.empty-text { font-size: 13px; line-height: 1.6; }

.setup-screen { padding: 24px 16px; }
.setup-title { font-family: 'Unbounded', sans-serif; font-size: 16px; font-weight: 800; margin-bottom: 8px; }
.setup-desc { font-size: 13px; color: var(--text2); line-height: 1.7; margin-bottom: 20px; }
.setup-code { background: var(--surface2); padding: 10px 14px; border-radius: var(--radius-sm); font-size: 12px; font-family: monospace; color: var(--accent); margin: 8px 0 16px; word-break: break-all; }
.setup-input { width: 100%; padding: 12px 14px; background: var(--surface2); border: 1px solid rgba(255,255,255,0.08); border-radius: var(--radius-sm); color: var(--text); font-size: 14px; outline: none; margin-bottom: 10px; font-family: 'Inter', sans-serif; transition: border-color 0.2s; }
.setup-input:focus { border-color: var(--accent); }
.setup-btn { width: 100%; height: 44px; background: var(--accent); border: none; border-radius: 100px; color: #000; font-size: 14px; font-weight: 700; font-family: 'Inter', sans-serif; cursor: pointer; }

.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--surface3); color: var(--text); padding: 9px 18px; border-radius: 100px; font-size: 13px; font-weight: 500; opacity: 0; transition: opacity 0.25s; pointer-events: none; white-space: nowrap; z-index: 999; }
.toast.show { opacity: 1; }

/* ── PLAYER ── */
.player {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 500;
  background: rgba(14,14,14,0.98);
  backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
  border-top: 1px solid rgba(255,255,255,0.06);
  transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  padding-bottom: env(safe-area-inset-bottom);
}
.player.show { transform: translateY(0); }

/* Seek bar */
.player-seek { padding: 10px 14px 0; cursor: pointer; user-select: none; -webkit-user-select: none; }
.player-seek-track { height: 4px; background: var(--surface3); border-radius: 2px; position: relative; transition: height 0.12s; }
.player-seek:hover .player-seek-track,
.player-seek:active .player-seek-track { height: 6px; }
.player-seek-fill { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; position: relative; }
.player-seek-thumb {
  position: absolute; right: -6px; top: 50%; transform: translateY(-50%) scale(0);
  width: 13px; height: 13px; border-radius: 50%; background: #fff; transition: transform 0.12s;
}
.player-seek:hover .player-seek-thumb,
.player-seek:active .player-seek-thumb { transform: translateY(-50%) scale(1); }
.player-times { display: flex; justify-content: space-between; padding: 3px 15px 0; }
.player-time { font-size: 10px; color: var(--text3); font-variant-numeric: tabular-nums; }

.player-body {
  display: flex; align-items: center; gap: 10px; padding: 8px 14px 4px;
  position: relative;
}
.player-cover {
  width: 44px; height: 44px; border-radius: 8px;
  background: var(--surface2); flex-shrink: 0; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.player-cover img { width: 100%; height: 100%; object-fit: cover; }
.player-info { flex: 1; min-width: 0; }
.player-artist { font-size: 11px; color: var(--text2); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.player-title { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.player-controls { display: flex; align-items: center; gap: 2px; }
.player-btn {
  width: 36px; height: 36px; border-radius: 50%; border: none;
  background: none; color: var(--text2); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.15s; flex-shrink: 0; padding: 0;
}
.player-btn:active { opacity: 0.5; }
.player-btn.play-btn { background: var(--accent); color: #000; width: 40px; height: 40px; margin: 0 2px; }
.player-btn.tg-btn { color: var(--text2); }

/* Volume */
.player-volume { display: flex; align-items: center; gap: 8px; padding: 2px 14px 10px; }
.vol-btn { background: none; border: none; color: var(--text3); cursor: pointer; padding: 0; display: flex; align-items: center; flex-shrink: 0; transition: color 0.15s; }
.vol-btn:hover { color: var(--text); }
.vol-slider-wrap { flex: 1; overflow: hidden; max-width: 0; opacity: 0; transition: max-width 0.25s ease, opacity 0.25s ease; }
.player-volume:hover .vol-slider-wrap,
.player-volume:focus-within .vol-slider-wrap { max-width: 200px; opacity: 1; }
.vol-slider { width: 100%; -webkit-appearance: none; appearance: none; height: 3px; border-radius: 2px; outline: none; cursor: pointer; display: block; }
.vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 11px; height: 11px; border-radius: 50%; background: var(--accent); cursor: pointer; }

/* Player menu */
.player-menu {
  display: none; position: absolute; bottom: 100%; right: 0;
  background: var(--surface2); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px; overflow: hidden; min-width: 190px;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.4); z-index: 10; margin-bottom: 4px;
}
.player-menu.show { display: block; }
.player-menu-item {
  display: flex; align-items: center; gap: 10px; width: 100%;
  padding: 12px 16px; border: none; background: none; color: var(--text);
  font-size: 13px; cursor: pointer; text-align: left;
}
.player-menu-item:active { background: rgba(255,255,255,0.06); }
.player-menu-item svg { color: var(--text2); flex-shrink: 0; }

/* Lyrics modal */
.lyrics-modal {
  position: fixed; inset: 0; z-index: 600;
  background: rgba(0,0,0,0.85); backdrop-filter: blur(20px);
  display: flex; flex-direction: column;
  transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
}
.lyrics-modal.show { transform: translateY(0); }
.lyrics-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0;
}
.lyrics-title { font-size: 14px; font-weight: 700; }
.lyrics-subtitle { font-size: 11px; color: var(--text2); margin-top: 2px; }
.lyrics-close { background: none; border: none; color: var(--text2); cursor: pointer; padding: 6px; }
.lyrics-body {
  flex: 1; overflow-y: auto; padding: 20px;
  font-size: 16px; line-height: 2; color: var(--text); white-space: pre-wrap;
  -webkit-overflow-scrolling: touch;
}
.lyrics-loading { display: flex; align-items: center; justify-content: center; flex: 1; color: var(--text2); }
.lyrics-not-found { text-align: center; color: var(--text2); padding: 40px 20px; line-height: 1.8; }

.status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); flex-shrink: 0; transition: background 0.3s; }
.status-dot.online { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
/* ── STUDIO ── */
.studio-search-wrap {
  display: flex; gap: 8px; margin-bottom: 16px;
}
.studio-search-input {
  flex: 1; padding: 10px 14px;
  background: var(--surface2); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 100px; color: var(--text); font-size: 14px;
  font-family: 'Inter', sans-serif; outline: none;
  transition: border-color 0.2s;
}
.studio-search-input:focus { border-color: var(--accent); }
.studio-search-btn {
  padding: 10px 18px; background: var(--accent); border: none;
  border-radius: 100px; color: #000; font-size: 13px; font-weight: 700;
  font-family: 'Inter', sans-serif; cursor: pointer; white-space: nowrap;
  transition: opacity 0.15s;
}
.studio-search-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.studio-result {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
}
.studio-result:last-child { border-bottom: none; }
.studio-thumb {
  width: 46px; height: 46px; border-radius: var(--radius-sm);
  background: var(--surface2); flex-shrink: 0; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.studio-thumb img { width: 100%; height: 100%; object-fit: cover; }
.studio-result-info { flex: 1; min-width: 0; }
.studio-result-artist { font-size: 11px; color: var(--text2); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.studio-result-title  { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.studio-result-meta   { font-size: 10px; color: var(--text3); margin-top: 2px; }
.studio-add-btn {
  width: 34px; height: 34px; border-radius: 50%; border: none;
  background: var(--accent); color: #000; font-size: 18px; font-weight: 700;
  cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s, opacity 0.15s;
}
.studio-add-btn:active { transform: scale(0.9); }
.studio-add-btn.done   { background: var(--surface3); color: var(--text3); cursor: default; font-size: 14px; }
.studio-add-btn.in-arc { background: var(--surface3); color: var(--text3); cursor: default; font-size: 14px; }

/* Job cards */
.job-card {
  background: var(--surface); border-radius: var(--radius);
  border: 1px solid rgba(255,255,255,0.06);
  padding: 14px; margin-bottom: 10px;
  transition: border-color 0.3s;
}
.job-card.ready  { border-color: rgba(200,245,58,0.35); }
.job-card.error  { border-color: rgba(255,80,80,0.35); }
.job-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.job-card-info   { flex: 1; min-width: 0; }
.job-card-artist { font-size: 11px; color: var(--text2); }
.job-card-title  { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.job-step        { font-size: 12px; color: var(--text2); margin-bottom: 10px; min-height: 18px; }
.job-progress    { height: 3px; background: var(--surface3); border-radius: 2px; overflow: hidden; margin-bottom: 10px; }
.job-progress-fill {
  height: 100%; background: var(--accent); border-radius: 2px;
  width: 0%; transition: width 0.4s ease;
  animation: progress-pulse 1.5s ease-in-out infinite;
}
.job-card.ready  .job-progress-fill { width: 100%; animation: none; }
.job-card.error  .job-progress-fill { width: 100%; background: #ff5050; animation: none; }
@keyframes progress-pulse {
  0%, 100% { opacity: 1; } 50% { opacity: 0.6; }
}
.job-actions     { display: flex; gap: 8px; }
.job-publish-btn {
  flex: 1; height: 36px; border-radius: 100px;
  background: var(--accent); border: none; color: #000;
  font-size: 13px; font-weight: 700; font-family: 'Inter', sans-serif;
  cursor: pointer; transition: opacity 0.15s;
}
.job-publish-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.job-dismiss-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--surface2); border: none; color: var(--text2);
  font-size: 16px; cursor: pointer;
}

/* Edit track modal */
.edit-modal {
  position: fixed; inset: 0; z-index: 700;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
  display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none; transition: opacity 0.25s;
}
.edit-modal.show { opacity: 1; pointer-events: all; }
.edit-sheet {
  width: 100%; background: var(--surface);
  border-radius: var(--radius) var(--radius) 0 0;
  padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
  transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
}
.edit-modal.show .edit-sheet { transform: translateY(0); }
.edit-sheet-title { font-family: 'Unbounded', sans-serif; font-size: 14px; font-weight: 700; margin-bottom: 16px; }
.edit-field { margin-bottom: 12px; }
.edit-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
.edit-input {
  width: 100%; padding: 10px 12px;
  background: var(--surface2); border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-sm); color: var(--text); font-size: 14px;
  font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.2s;
}
.edit-input:focus { border-color: var(--accent); }
.edit-actions { display: flex; gap: 8px; margin-top: 16px; }
.edit-save-btn {
  flex: 1; height: 42px; background: var(--accent); border: none;
  border-radius: 100px; color: #000; font-size: 14px; font-weight: 700;
  font-family: 'Inter', sans-serif; cursor: pointer;
}
.edit-cancel-btn {
  height: 42px; padding: 0 20px; background: var(--surface2); border: none;
  border-radius: 100px; color: var(--text2); font-size: 14px;
  font-family: 'Inter', sans-serif; cursor: pointer;
}

/* Playlist picker sheet */
.pl-sheet {
  position: fixed; inset: 0; z-index: 710;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
  display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none; transition: opacity 0.25s;
}
.pl-sheet.show { opacity: 1; pointer-events: all; }
.pl-sheet-inner {
  width: 100%; background: var(--surface);
  border-radius: var(--radius) var(--radius) 0 0;
  padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
  transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
}
.pl-sheet.show .pl-sheet-inner { transform: translateY(0); }
.pl-sheet-title { font-family: 'Unbounded', sans-serif; font-size: 14px; font-weight: 700; margin-bottom: 14px; }
.pl-option {
  display: flex; align-items: center; gap: 10px; width: 100%;
  padding: 12px; border-radius: var(--radius-sm);
  background: none; border: none; color: var(--text);
  font-size: 14px; cursor: pointer; text-align: left;
  transition: background 0.15s;
}
.pl-option:active { background: var(--surface2); }
.pl-option-count { font-size: 11px; color: var(--text3); margin-left: auto; }

.studio-filter-bar {
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px; margin-bottom: 12px; flex-wrap: wrap;
}
.studio-filters { display: flex; gap: 6px; }
.sfilter {
  padding: 5px 12px; border-radius: 100px; border: 1px solid rgba(255,255,255,0.08);
  font-size: 11px; font-weight: 600; font-family: 'Inter', sans-serif;
  cursor: pointer; background: var(--surface2); color: var(--text2);
  transition: all 0.15s; white-space: nowrap;
}
.sfilter.active { background: var(--accent); color: #000; border-color: transparent; }
.studio-sort-select {
  background: var(--surface2); border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-sm); color: var(--text2); font-size: 11px;
  padding: 5px 8px; cursor: pointer; font-family: 'Inter', sans-serif; outline: none;
}

.sr-action-btn {
  width: 32px; height: 32px; border-radius: 50%; border: none;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; transition: transform 0.15s, opacity 0.15s;
}
.sr-action-btn:active { transform: scale(0.88); }
.sr-add  { background: var(--accent); color: #000; }
.sr-done { background: var(--surface3); color: var(--text3); cursor: default; }
.sr-preview-btn {
  width: 32px; height: 32px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.1);
  background: var(--surface2); color: var(--text2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; transition: all 0.15s;
}
.sr-preview-btn.playing { background: var(--surface3); color: var(--accent); border-color: var(--accent); }
.srp {
  width: 100%; height: 100%; border-radius: var(--radius-sm);
  background: linear-gradient(135deg, var(--surface2), var(--surface3));
}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">Music <em>Archive</em></div>
    <div class="status-dot" id="statusDot"></div>
    <div class="header-actions">
      <button class="icon-btn" onclick="toggleSearch()">⌕</button>
      <button class="icon-btn" onclick="showApiSetup()">⚙</button>
    </div>
  </div>
  <div class="tabs-wrap" id="tabsWrap">
    <button class="tab active" onclick="switchTab('home',this)">Главная</button>
    <button class="tab" onclick="switchTab('playlists',this)">Плейлисты</button>
    <button class="tab" id="studioTab" style="display:none" onclick="switchTab('studio',this)">Студия</button>
  </div>
  <div class="search-header" id="searchHeader">
    <button class="back-btn-search" onclick="closeSearch()">←</button>
    <div class="search-wrap">
      <input class="search-input" id="searchInput" placeholder="Артист, трек..."
             autocomplete="off" oninput="handleSearch(this.value)">
      <button class="search-clear" id="searchClear" onclick="clearSearchInput()">✕</button>
    </div>
  </div>
</div>

<div id="mainView">
  <div class="content" id="tabContent">
    <div class="loading"><div class="spinner"></div></div>
  </div>
</div>

<div id="searchView" class="search-view">
  <div class="content" id="searchContent">
    <div class="search-hint">Введи запрос</div>
  </div>
</div>

<div id="detailView" class="detail-view">
  <div class="detail-header">
    <button class="back-btn" onclick="closeDetail()">←</button>
    <div class="detail-title" id="detailTitleBar"></div>
  </div>
  <div id="detailContent"></div>
</div>

<!-- PLAYER -->
<div class="player" id="player">
  <div class="player-seek" id="playerSeek" onmousedown="seekStart(event)" ontouchstart="seekStart(event)">
    <div class="player-seek-track">
      <div class="player-seek-fill" id="playerFill"><div class="player-seek-thumb"></div></div>
    </div>
  </div>
  <div class="player-times">
    <span class="player-time" id="timeCurrent">0:00</span>
    <span class="player-time" id="timeDuration">0:00</span>
  </div>
  <div class="player-body">
    <div class="player-cover" id="playerCover">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="var(--text3)"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>
    </div>
    <div class="player-info">
      <div class="player-artist" id="playerArtist"></div>
      <div class="player-title" id="playerTitle">Ничего не играет</div>
    </div>
    <div class="player-controls">
      <button class="player-btn" onclick="skipTrack(-1)" title="Назад">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="player-btn play-btn" id="playBtn" onclick="togglePlay()">
        <svg id="playIcon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="player-btn" onclick="skipTrack(1)" title="Вперёд">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M18 6h-2v12h2zm-3.5 6L6 6v12z"/></svg>
      </button>
      <button class="player-btn" onclick="togglePlayerMenu()" id="moreBtn" title="Ещё">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
      </button>
      <button class="player-btn" onclick="closePlayer()" title="Закрыть">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
      <div class="player-menu" id="playerMenu">
        <button class="player-menu-item" onclick="openInTelegram();togglePlayerMenu()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.562 8.248-2.04 9.61c-.148.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L7.48 14.4l-2.95-.924c-.642-.2-.654-.642.136-.953l11.52-4.44c.535-.194 1.003.13.376.165z"/></svg>
          Отправить в Telegram
        </button>
        <button class="player-menu-item" onclick="downloadCurrentTrack();togglePlayerMenu()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          Скачать трек
        </button>
        <button class="player-menu-item" onclick="openLyrics();togglePlayerMenu()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M14 17H4v2h10v-2zm6-8H4v2h16V9zM4 15h16v-2H4v2zM4 5v2h16V5H4z"/></svg>
          Текст трека
        </button>
      </div>
    </div>
  </div>
  <div class="player-volume">
    <button class="vol-btn" onclick="toggleMute()" id="volBtn">
      <svg id="volIcon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
    </button>
    <div class="vol-slider-wrap"><input type="range" class="vol-slider" id="volSlider" min="0" max="100" value="100" oninput="setVolume(this.value)"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }
const USER_ID = tg?.initDataUnsafe?.user?.id || 0;

let BOT_API    = localStorage.getItem('mab_api_url') || '';
let allTracks  = [];
let playlists  = [];
let favorites  = new Set(JSON.parse(localStorage.getItem('mab_favs') || '[]'));
let currentTab = 'home';
let searchTimer = null;
let searchOpen  = false;

// ── API ──────────────────────────────────────

async function api(path) {
  if (!BOT_API) return null;
  try {
    const sep = path.includes('?') ? '&' : '?';
    const r = await fetch(`${BOT_API}${path}${sep}_=${Date.now()}`, {
      signal: AbortSignal.timeout(8000)
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return await r.json();
  } catch(e) { console.warn('API:', e.message); return null; }
}

async function autoFetchTunnelUrl() {
  // Cloudflare Worker — фиксированный URL, бот пишет туда туннель при старте
  // Быстро (<100ms), бесплатно, не трогает GitHub
  const WORKER_URL = 'https://mab-tunnel.lordo.workers.dev';

  try {
    const r = await fetch(WORKER_URL, {
      signal: AbortSignal.timeout(3000),
      cache: 'no-store'
    });
    if (r.ok) {
      const d = await r.json();
      if (d.url && d.url.startsWith('http')) {
        diagLog('autoFetch: got from worker: ' + d.url);
        BOT_API = d.url;
        localStorage.setItem('mab_api_url', d.url);
        return;
      }
    }
  } catch(e) {
    diagLog('autoFetch worker failed: ' + e);
  }

  // Fallback: сохранённый URL в localStorage
  if (BOT_API) {
    diagLog('autoFetch: using saved: ' + BOT_API);
  }
}

async function checkConnection() {
  const ok = await api('/health');
  document.getElementById('statusDot').classList.toggle('online', !!ok);
  return !!ok;
}

// ── SETUP ────────────────────────────────────

function showApiSetup() {
  closeSearch();
  closeDetail();
  document.getElementById('mainView').style.display = 'block';
  document.getElementById('searchView').classList.remove('show');
  document.getElementById('tabContent').innerHTML = `
    <div class="setup-screen">
      <div class="setup-title">Подключение</div>
      <div class="setup-desc">
        Запусти <code style="color:var(--accent)">start.bat</code> — URL обновится автоматически.<br><br>
        Или вставь URL из окна cloudflared вручную:
        <div class="setup-code">cloudflared tunnel --url http://localhost:8080 --protocol http2</div>
      </div>
      <input id="apiUrlInput" class="setup-input" type="url"
        value="${x(BOT_API)}" placeholder="https://xxxx.trycloudflare.com">
      <button class="setup-btn" onclick="applyApiUrl()">Сохранить и подключиться</button>
    </div>`;
}

async function applyApiUrl() {
  const url = (document.getElementById('apiUrlInput')?.value || '').trim().replace(/\/$/, '');
  if (!url.startsWith('http')) { toast('URL должен начинаться с https://'); return; }
  BOT_API = url;
  localStorage.setItem('mab_api_url', url);
  toast('Проверяю...');
  const ok = await checkConnection();
  if (ok) {
    toast('Подключено ✓');
    fetchBotUsername();
    // Явно переключаемся на home — убираем экран настроек
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === 0));
    currentTab = 'home';
    loadTab('home');
  } else {
    toast('Сервер не отвечает');
  }
}

// ── NAV ──────────────────────────────────────

function switchTab(tab, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (btn) btn.classList.add('active');
  else document.querySelectorAll('.tab')[['home','playlists','studio'].indexOf(tab)]?.classList.add('active');
  currentTab = tab;
  loadTab(tab);
}

async function loadTab(tab) {
  const el = document.getElementById('tabContent');
  el.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  if (!BOT_API) { showApiSetup(); return; }
  if      (tab === 'home')      await renderHome(el);
  else if (tab === 'playlists') await renderPlaylists(el);
  else if (tab === 'recent')    await renderRecent(el);
  else if (tab === 'favorites') await renderFavorites(el);
  else if (tab === 'studio')    await renderStudio(el);
}

// ── HOME ─────────────────────────────────────

async function renderHome(el) {
  const [pls, recent] = await Promise.all([api('/playlists'), api('/tracks/recent?limit=20')]);
  playlists = pls || [];
  allTracks = recent || [];
  if (!playlists.length && !allTracks.length) { el.innerHTML = empty('Архив пуст'); return; }
  let html = `<div class="hero"><div class="hero-label">Личный архив</div><div class="hero-title">Music Archive</div><div class="hero-sub">${allTracks.length ? allTracks.length + '+ треков' : 'Добавляй треки через бота'}</div></div>`;

  // Плейлисты + карточка Избранного
  const favCount = favorites.size;
  const favCard = `
    <div class="playlist-card" onclick="openFavoritesPlaylist()">
      <div class="playlist-card-bg">
        <div style="width:100%;height:100%;background:linear-gradient(135deg,#1a0a0a,#2a1010);display:flex;align-items:center;justify-content:center;font-size:36px">♥</div>
      </div>
      <div class="playlist-card-overlay"></div>
      <div class="playlist-card-info">
        <div class="playlist-name">Избранное</div>
        <div class="playlist-count">${favCount} треков</div>
      </div>
    </div>`;

  if (playlists.length || favCount > 0) {
    html += `<div class="section-title">Плейлисты</div><div class="playlists-grid">`;
    html += favCard;
    playlists.forEach(pl => { html += playlistCard(pl); });
    html += `</div>`;
  }
  if (allTracks.length) {
    html += `<div class="section-title">Последние добавления</div>`;
    html += buildTrackRows(allTracks.slice(0, 12));
  }
  el.innerHTML = html;
}

async function openFavoritesPlaylist() {
  document.getElementById('mainView').style.display = 'none';
  document.getElementById('searchView').classList.remove('show');
  const dv = document.getElementById('detailView');
  dv.classList.add('show');
  document.getElementById('detailTitleBar').textContent = 'Избранное';
  const content = document.getElementById('detailContent');
  content.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

  if (!favorites.size) {
    content.innerHTML = `
      <div class="detail-hero">
        <div class="detail-cover"><div style="width:100%;height:100%;background:linear-gradient(135deg,#1a0a0a,#2a1010);display:flex;align-items:center;justify-content:center;font-size:40px">♥</div></div>
        <div><div class="detail-name">Избранное</div><div class="detail-count">0 треков</div></div>
      </div>
      <div style="padding:0 16px">${empty('Нажми ♡ на любом треке')}</div>`;
    return;
  }

  const tracks = await api('/tracks/recent?limit=500');
  const favs = (tracks || []).filter(t => favorites.has(t.file_id));

  const coverHtml = `<div style="width:100%;height:100%;background:linear-gradient(135deg,#1a0a0a,#2a1010);display:flex;align-items:center;justify-content:center;font-size:40px">♥</div>`;
  let html = `
    <div class="detail-hero">
      <div class="detail-cover">${coverHtml}</div>
      <div>
        <div class="detail-name">Избранное</div>
        <div class="detail-count">${favs.length} треков</div>
      </div>
    </div>
    <div class="detail-btns">
      <button class="btn-primary" onclick="setPlayContext(${JSON.stringify(favs).replace(/"/g,'&quot;')}, 0)">▶ Слушать</button>
    </div>
    <div style="padding:0 16px 40px;">`;
  html += favs.length ? buildTrackRows(favs) : empty('Треки не найдены в архиве');
  content.innerHTML = html + '</div>';
}

async function renderPlaylists(el) {
  if (!playlists.length) playlists = await api('/playlists') || [];
  if (!playlists.length) { el.innerHTML = empty('Плейлистов нет'); return; }
  let html = `<div class="section-title">Все плейлисты</div><div class="playlists-grid">`;
  playlists.forEach(pl => { html += playlistCard(pl); });
  el.innerHTML = html + '</div>';
}

async function renderRecent(el) {
  const tracks = await api('/tracks/recent?limit=50');
  if (!tracks?.length) { el.innerHTML = empty('Треков пока нет'); return; }
  let html = `<div class="section-title">${tracks.length} треков</div>`;
  html += buildTrackRows(tracks);
  el.innerHTML = html;
}

async function renderFavorites(el) {
  if (!favorites.size) { el.innerHTML = empty('Нажми ♡ на треке'); return; }
  const tracks = await api('/tracks/recent?limit=200');
  if (!tracks) { el.innerHTML = empty('Ошибка загрузки'); return; }
  const favs = tracks.filter(t => favorites.has(t.file_id));
  if (!favs.length) { el.innerHTML = empty('Треки не найдены'); return; }
  let html = `<div class="section-title">${favs.length} треков</div>`;
  html += buildTrackRows(favs);
  el.innerHTML = html;
}

// ── PLAYLIST DETAIL ───────────────────────────

async function openPlaylist(id) {
  const pl = playlists.find(p => p.id === id) || { name: '...', id };
  document.getElementById('mainView').style.display = 'none';
  document.getElementById('searchView').classList.remove('show');
  const dv = document.getElementById('detailView');
  dv.classList.add('show');
  document.getElementById('detailTitleBar').textContent = pl.name;
  const content = document.getElementById('detailContent');
  content.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  const data = await api(`/playlists/${id}/tracks?limit=100`);
  const initials = pl.name.slice(0,2).toUpperCase();
  const coverHtml = pl.cover
    ? `<img src="${x(pl.cover)}" loading="lazy">`
    : `<div style="width:100%;height:100%;background:linear-gradient(135deg,#141414,#1e1e0a);display:flex;align-items:center;justify-content:center;font-family:Unbounded,sans-serif;font-size:22px;font-weight:800;color:#2a2a1a">${x(initials)}</div>`;
  let html = `
    <div class="detail-hero">
      <div class="detail-cover">${coverHtml}</div>
      <div>
        <div class="detail-name">${x(pl.name)}</div>
        ${pl.description ? `<div class="detail-desc">${x(pl.description)}</div>` : ''}
        <div class="detail-count">${data?.total || 0} треков</div>
      </div>
    </div>
    <div class="detail-btns">
      <button class="btn-primary" onclick="playRandom(${id})">▶ Случайный</button>
      <button class="btn-secondary" onclick="playRandom(${id})">⇌</button>
    </div>
    <div style="padding:0 16px 40px;">`;
  if (data?.tracks?.length) html += buildTrackRows(data.tracks);
  else html += empty('Плейлист пуст');
  content.innerHTML = html + '</div>';
}

function closeDetail() {
  document.getElementById('detailView').classList.remove('show');
  document.getElementById('mainView').style.display = 'block';
}

async function playRandom(plId) {
  const data = await api(`/tracks/random?playlist_id=${plId}`);
  if (data?.file_id) playTrack(data); else toast('Плейлист пуст');
}

// ── SEARCH ───────────────────────────────────

function toggleSearch() {
  if (searchOpen) { closeSearch(); return; }
  searchOpen = true;
  document.getElementById('tabsWrap').style.display = 'none';
  document.getElementById('searchHeader').classList.add('active');
  document.getElementById('mainView').style.display = 'none';
  document.getElementById('detailView').classList.remove('show');
  document.getElementById('searchView').classList.add('show');
  setTimeout(() => document.getElementById('searchInput').focus(), 50);
}

function closeSearch() {
  if (!searchOpen) return;
  searchOpen = false;
  document.getElementById('tabsWrap').style.display = 'flex';
  document.getElementById('searchHeader').classList.remove('active');
  document.getElementById('searchView').classList.remove('show');
  document.getElementById('mainView').style.display = 'block';
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').classList.remove('visible');
  document.getElementById('searchContent').innerHTML = '<div class="search-hint">Введи запрос</div>';
}

function clearSearchInput() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').classList.remove('visible');
  document.getElementById('searchContent').innerHTML = '<div class="search-hint">Введи запрос</div>';
  document.getElementById('searchInput').focus();
}

function handleSearch(q) {
  document.getElementById('searchClear').classList.toggle('visible', q.length > 0);
  clearTimeout(searchTimer);
  if (!q.trim()) { document.getElementById('searchContent').innerHTML = '<div class="search-hint">Введи запрос</div>'; return; }
  searchTimer = setTimeout(() => doSearch(q.trim()), 350);
}

async function doSearch(q) {
  const el = document.getElementById('searchContent');
  el.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  const tracks = await api(`/tracks/search?q=${encodeURIComponent(q)}&limit=50`);
  if (!tracks) {
    el.innerHTML = `<div class="empty"><div class="empty-text">Нет подключения к серверу</div><button onclick="showApiSetup()" style="margin-top:14px;padding:9px 22px;background:var(--accent);border:none;border-radius:100px;color:#000;font-weight:700;font-size:13px;cursor:pointer;">Настроить</button></div>`;
    return;
  }
  if (!tracks.length) { el.innerHTML = empty('Ничего не найдено'); return; }
  let html = `<div class="section-title">${tracks.length} результатов</div>`;
  html += buildTrackRows(tracks);
  el.innerHTML = html;
}

function playlistCard(pl) {
  const initials = pl.name.slice(0,2).toUpperCase();
  const bg = pl.cover
    ? `<img src="${x(pl.cover)}" loading="lazy">`
    : `<div style="width:100%;height:100%;background:linear-gradient(135deg,#141414,#1e1e0a);display:flex;align-items:center;justify-content:center;font-family:Unbounded,sans-serif;font-size:26px;font-weight:800;color:#252510;letter-spacing:-1px">${x(initials)}</div>`;
  return `
    <div class="playlist-card" onclick="openPlaylist(${pl.id})">
      <div class="playlist-card-bg">${bg}</div>
      <div class="playlist-card-overlay"></div>
      <div class="playlist-card-info">
        <div class="playlist-name">${x(pl.name)}</div>
        <div class="playlist-count">${pl.track_count} треков</div>
      </div>
    </div>`;
}

function buildTrackRows(tracks) {
  let out = '';
  tracks.forEach(function(t, i) {
    const isFav = favorites.has(t.file_id);
    const badge = [t.year, t.genre].filter(Boolean).join(' \xb7 ');
    const coverUrl = getCoverUrl(t);
    const isPlaying = currentTrack && currentTrack.file_id === t.file_id;
    const tracksJson = JSON.stringify(tracks).replace(/"/g, '&quot;');
    const num = isPlaying ? '<span style="color:var(--accent)">\u25b6</span>' : String(i+1);
    const favClass = isFav ? 'on' : '';
    const favChar = isFav ? '\u2665' : '\u2661';
    const playingClass = isPlaying ? ' playing' : '';
    let coverHtml = '';
    if (coverUrl) {
      coverHtml = '<img src="' + x(coverUrl) + '" loading="lazy" style="width:100%;height:100%;object-fit:cover" onerror="this.remove()">';
    } else {
      // Gradient placeholder with artist initial
      var initial = (t.artist || t.title || '?')[0].toUpperCase();
      var hue = 0;
      for (var ci = 0; ci < (t.artist || '').length; ci++) hue = (hue + (t.artist || '').charCodeAt(ci) * 7) % 360;
      coverHtml = '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,hsl(' + hue + ',30%,15%),hsl(' + ((hue+40)%360) + ',25%,20%));font-size:15px;font-weight:800;color:hsl(' + hue + ',60%,65%)">' + initial + '</div>';
    }
    out += '<div class="track-item' + playingClass + '" onclick="setPlayContext(' + tracksJson + ',' + i + ')">';
    out += '<div class="track-num">' + num + '</div>';
    out += '<div class="track-cover">' + coverHtml + '</div>';
    out += '<div class="track-info">';
    out += '<div class="track-artist">' + x(t.artist) + '</div>';
    out += '<div class="track-title">' + x(t.title) + '</div>';
    if (badge) out += '<div class="track-badge">' + x(badge) + '</div>';
    out += '</div>';
    out += '<button class="track-fav ' + favClass + '" onclick="event.stopPropagation();toggleFav(\'' + x(t.file_id) + '\',this)">' + favChar + '</button>';
    out += '</div>';
  });
  return out;
}

function trackRow(t, num) {
  return buildTrackRows([t]);
}

function empty(text) {
  return `<div class="empty"><div class="empty-text">${text}</div></div>`;
}

let audio = new Audio();
// Hint browser to use highest quality decoding
audio.crossOrigin = 'anonymous';
let currentTrack = null;
let currentPlaylist = [];
let currentIndex = -1;
let isSeeking = false;
let botUsername = null;
let _prevVol = 1;

audio.preload = 'auto';

async function fetchBotUsername() {

    const r = await fetch(`${BOT_API}/bot-info`, { signal: AbortSignal.timeout(3000), headers: {'bypass-tunnel-reminder':'1'} });
    const d = await r.json();

// ── Seek ──────────────────────────────────────────────────────────────────
let _seekBar = null;
function seekStart(e) {
  e.preventDefault();
  _seekBar = document.getElementById('playerSeek');
  isSeeking = true;
  seekMove(e);
  const up = function() {
    isSeeking = false;
    document.removeEventListener('mousemove', seekMove);
    document.removeEventListener('mouseup', up);
    document.removeEventListener('touchmove', seekMove);
    document.removeEventListener('touchend', up);
  };
  document.addEventListener('mousemove', seekMove);
  document.addEventListener('mouseup', up);
  document.addEventListener('touchmove', seekMove, {passive: false});
  document.addEventListener('touchend', up);
}
function seekMove(e) {
  if (!isSeeking || !audio.duration || !_seekBar) return;
  e.preventDefault();
  const rect = _seekBar.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const pct = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
  audio.currentTime = pct * audio.duration;
  document.getElementById('playerFill').style.width = (pct * 100) + '%';
  document.getElementById('timeCurrent').textContent = fmtTime(audio.currentTime);
}

function fmtTime(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return m + ':' + String(sec).padStart(2, '0');
}

audio.addEventListener('timeupdate', function() {
  if (isSeeking || !audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  document.getElementById('playerFill').style.width = pct + '%';
  document.getElementById('timeCurrent').textContent = fmtTime(audio.currentTime);
  // Синхронизируем прогресс с системным плеером (каждые ~1 сек)
  if (Math.round(audio.currentTime) % 2 === 0) _syncPositionState();
});
audio.addEventListener('loadedmetadata', function() {
  document.getElementById('timeDuration').textContent = fmtTime(audio.duration);
});
audio.addEventListener('ended', function() {
  setPlayIcon(false);
  if (currentPlaylist.length > 1) {
    const next = (currentIndex + 1) % currentPlaylist.length;
    playTrack(currentPlaylist[next], next);
  }
});
audio.addEventListener('playing', function() {
  setPlayIcon(true);
  if ('mediaSession' in navigator) {
    navigator.mediaSession.playbackState = 'playing';
    _syncPositionState();
  }
});
audio.addEventListener('pause', function() {
  setPlayIcon(false);
  if ('mediaSession' in navigator) navigator.mediaSession.playbackState = 'paused';
});
let _streamRetries = 0;
audio.addEventListener('error', function() {
  if (!audio.src || audio.src === window.location.href) return;
  if (_streamRetries < 2) {
    _streamRetries++;
    setTimeout(function() {
      var src = audio.src;
      audio.src = src;
      audio.load();
      audio.play().catch(function(){});
    }, 800);
  } else {
    _streamRetries = 0;
    toast('Ошибка загрузки трека');
    setPlayIcon(false);
  }
});
audio.addEventListener('playing', function() { _streamRetries = 0; });

function getCoverUrl(t) {
  if (!t || !t.cover) return null;
  // Прямой URL (http/https или data:)
  if (t.cover.startsWith('data:') || t.cover.startsWith('http')) return t.cover;
  // Telegram file_id — проксируем через наш стрим
  if (BOT_API) return `${BOT_API}/stream/${encodeURIComponent(t.cover)}`;
  return null;
}

function playTrack(t, idx) {
  if (!BOT_API) { toast('Нет подключения к серверу'); return; }
  currentTrack = t;
  if (idx !== undefined) currentIndex = idx;
  document.getElementById('playerArtist').textContent = t.artist || '';
  document.getElementById('playerTitle').textContent = t.title || '';
  document.getElementById('timeDuration').textContent = '0:00';
  const cover = document.getElementById('playerCover');
  const coverUrl = getCoverUrl(t);
  cover.innerHTML = '';
  if (coverUrl) {
    const img = document.createElement('img');
    img.src = x(coverUrl);
    img.loading = 'lazy';
    img.style.cssText = 'width:100%;height:100%;object-fit:cover';
    img.onerror = function() { this.remove(); };
    cover.appendChild(img);
  } else {
    cover.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="var(--text3)"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>';
  }
  const streamUrl = `${BOT_API}/stream/${encodeURIComponent(t.file_id)}`;
  audio.src = streamUrl;
  audio.load();
  audio.play().catch(function(e) { toast('Не удалось воспроизвести'); });
  document.getElementById('player').classList.add('show');
  // Update playing highlight in track lists
  document.querySelectorAll('.track-item').forEach(function(el) {
    el.classList.remove('playing');
  });
  document.querySelectorAll('.track-item').forEach(function(el, i) {
    if (currentPlaylist[currentIndex] && el.querySelector('.track-title')) {
      var titleEl = el.querySelector('.track-title');
      var artistEl = el.querySelector('.track-artist');
      if (titleEl && artistEl &&
          titleEl.textContent === (t.title || '') &&
          artistEl.textContent === (t.artist || '')) {
        el.classList.add('playing');
        var numEl = el.querySelector('.track-num');
        if (numEl) numEl.innerHTML = '<span style="color:var(--accent)">&#9654;</span>';
      }
    }
  });
  document.body.style.paddingBottom = '150px';
  updateMediaSession(t, coverUrl);
}

// ── MEDIA SESSION (системный плеер телефона) ──────────────────────────────

function updateMediaSession(t, coverUrl) {
  if (!('mediaSession' in navigator)) return;

  // Artwork: Media Session требует абсолютный URL
  var artwork = [];
  if (coverUrl) {
    // Если URL относительный или data: — берём как есть, иначе нужен абсолютный
    var absUrl = coverUrl.startsWith('http') || coverUrl.startsWith('data:')
      ? coverUrl
      : (window.location.origin + coverUrl);
    artwork = [
      { src: absUrl, sizes: '96x96',   type: 'image/jpeg' },
      { src: absUrl, sizes: '256x256', type: 'image/jpeg' },
      { src: absUrl, sizes: '512x512', type: 'image/jpeg' },
    ];
  }

  navigator.mediaSession.metadata = new MediaMetadata({
    title:  t.title  || '',
    artist: t.artist || '',
    album:  [t.year, t.genre].filter(Boolean).join(' · ') || 'Music Archive',
    artwork: artwork
  });

  // Кнопки управления
  navigator.mediaSession.setActionHandler('play',          function() { audio.play(); });
  navigator.mediaSession.setActionHandler('pause',         function() { audio.pause(); });
  navigator.mediaSession.setActionHandler('stop',          function() { closePlayer(); });
  navigator.mediaSession.setActionHandler('previoustrack', function() { skipTrack(-1); });
  navigator.mediaSession.setActionHandler('nexttrack',     function() { skipTrack(1); });

  // Перемотка (+/- 10 сек и seekto по таймлайну)
  navigator.mediaSession.setActionHandler('seekbackward', function(d) {
    audio.currentTime = Math.max(0, audio.currentTime - (d.seekOffset || 10));
    _syncPositionState();
  });
  navigator.mediaSession.setActionHandler('seekforward', function(d) {
    audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + (d.seekOffset || 10));
    _syncPositionState();
  });
  navigator.mediaSession.setActionHandler('seekto', function(d) {
    if (d.seekTime !== undefined && audio.duration) {
      audio.currentTime = d.seekTime;
      _syncPositionState();
    }
  });
}

function _syncPositionState() {
  if (!('mediaSession' in navigator) || !audio.duration) return;
  try {
    navigator.mediaSession.setPositionState({
      duration:     audio.duration,
      playbackRate: audio.playbackRate || 1,
      position:     Math.min(audio.currentTime, audio.duration)
    });
  } catch(e) {}
}

function setPlayContext(tracks, startIdx) {
  currentPlaylist = tracks || [];
  playTrack(currentPlaylist[startIdx], startIdx);
}

function skipTrack(dir) {
  if (!currentPlaylist.length) return;
  const next = ((currentIndex + dir) + currentPlaylist.length) % currentPlaylist.length;
  playTrack(currentPlaylist[next], next);
}

function setPlayIcon(playing) {
  const el = document.getElementById('playIcon');
  if (!el) return;
  el.innerHTML = playing
    ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'
    : '<path d="M8 5v14l11-7z"/>';
}

function togglePlay() {
  if (!currentTrack) return;
  if (audio.paused) audio.play();
  else audio.pause();
}

function closePlayer() {
  audio.pause();
  audio.removeAttribute('src');
  audio.load();
  currentTrack = null;
  document.getElementById('player').classList.remove('show');
  document.body.style.paddingBottom = '';
  setPlayIcon(false);
  document.getElementById('playerFill').style.width = '0%';
  document.getElementById('timeCurrent').textContent = '0:00';
  document.getElementById('timeDuration').textContent = '0:00';
  if ('mediaSession' in navigator) {
    navigator.mediaSession.playbackState = 'none';
    navigator.mediaSession.metadata = null;
  }
}

function setVolume(val) {
  val = parseInt(val);
  audio.volume = val / 100;
  const slider = document.getElementById('volSlider');
  if (slider) slider.style.background = `linear-gradient(to right, var(--accent) ${val}%, var(--surface3) ${val}%)`;
  const el = document.getElementById('volIcon');
  if (!el) return;
  if (val == 0) el.innerHTML = '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>';
  else if (val < 50) el.innerHTML = '<path d="M18.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM5 9v6h4l5 5V4L9 9H5z"/>';
  else el.innerHTML = '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
}

function toggleMute() {
  const slider = document.getElementById('volSlider');
  if (!slider) return;
  if (audio.volume > 0) { _prevVol = audio.volume; slider.value = 0; }
  else { slider.value = Math.round(_prevVol * 100); }
  setVolume(slider.value);
}

function togglePlayerMenu() {
  const menu = document.getElementById('playerMenu');

}
document.addEventListener('click', function(e) {

async function openLyrics() {
  if (!currentTrack) return;
  const modal = document.getElementById('lyricsModal');
  const body = document.getElementById('lyricsBody');
  const titleEl = document.getElementById('lyricsSongTitle');
  const artistEl = document.getElementById('lyricsArtist');
  titleEl.textContent = currentTrack.title || 'Текст трека';
  artistEl.textContent = currentTrack.artist || '';
  body.innerHTML = '<div class="lyrics-loading"><div class="spinner"></div></div>';
  modal.classList.add('show');

  // Fetch from lyrics API via our server proxy or directly
  const q = encodeURIComponent((currentTrack.artist || '') + ' ' + (currentTrack.title || ''));
  try {
    // Try our server endpoint first
    let lyrics = null;
    if (BOT_API) {
      const r = await fetch(`${BOT_API}/lyrics?q=${q}`, {
        signal: AbortSignal.timeout(8000),
        headers: {'bypass-tunnel-reminder': '1'}
      });
      if (r.ok) {
        const d = await r.json();
        lyrics = d.lyrics;
      }
    }
    if (lyrics) {
      body.innerHTML = '';
      const pre = document.createElement('div');
      pre.style.cssText = 'font-size:16px;line-height:2;white-space:pre-wrap';
      pre.textContent = lyrics;
      body.appendChild(pre);
    } else {
      body.innerHTML = '<div class="lyrics-not-found">Текст не найден<br><br><a href="https://genius.com/search?q=' + q + '" target="_blank" style="color:var(--accent)">Искать на Genius</a></div>';
    }
  } catch(e) {
    body.innerHTML = '<div class="lyrics-not-found">Ошибка загрузки текста<br><br><a href="https://genius.com/search?q=' + q + '" target="_blank" style="color:var(--accent)">Открыть Genius</a></div>';
  }
}

function closeLyrics() {
  document.getElementById('lyricsModal').classList.remove('show');
}

function downloadCurrentTrack() {
  if (!currentTrack || !BOT_API) return;
  const a = document.createElement('a');
  a.href = `${BOT_API}/stream/${encodeURIComponent(currentTrack.file_id)}`;
  a.download = `${currentTrack.artist} - ${currentTrack.title}.mp3`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);

function openInTelegram() {
  if (!currentTrack) return;
  if (window.Telegram && Telegram.WebApp && Telegram.WebApp.initData) {
    try { Telegram.WebApp.sendData(JSON.stringify({action: 'send_track', file_id: currentTrack.file_id})); } catch(e) {}
  } else if (botUsername) {
    window.open(`https://t.me/${botUsername}?start=track_${encodeURIComponent(currentTrack.file_id)}`, '_blank');
  }
}

function seekAudio(e) {
  if (!audio.duration) return;
  const bar = document.getElementById('playerSeek');
  const pct = e.offsetX / bar.offsetWidth;
  audio.currentTime = pct * audio.duration;
}
function toggleFav(fileId, btn) {
  if (favorites.has(fileId)) { favorites.delete(fileId); btn.textContent = '♡'; btn.classList.remove('on'); }
  else { favorites.add(fileId); btn.textContent = '♥'; btn.classList.add('on'); }
  localStorage.setItem('mab_favs', JSON.stringify([...favorites]));
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

function x(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Поиск ────────────────────────────────────

async function studioDoSearch() {
  const q = (document.getElementById('studioQ')?.value || '').trim();
  if (!q) return;
  const btn = document.getElementById('studioBtn');
  const res = document.getElementById('studioResults');
  if (btn) { btn.disabled = true; btn.textContent = '...'; }
  if (res) res.innerHTML = '<div class="loading"><div class="spinner"></div><span>Ищу...</span></div>';
  document.getElementById('studioFilterBar').style.display = 'none';

  try {
    const r = await studioApi(`/studio/search?q=${encodeURIComponent(q)}&limit=15`);
    if (!r || r.error) {
      if (res) res.innerHTML = `<div class="empty"><div class="empty-text">${r?.error || 'Ошибка соединения'}</div></div>`;
      return;
    }
    _studioResults = r;
    _studioFilter  = 'all';
    _studioSort    = 'default';
    // Сбрасываем фильтры в UI
    document.querySelectorAll('.sfilter').forEach(b => b.classList.toggle('active', b.dataset.f === 'all'));
    document.querySelector('.studio-sort-select') && (document.querySelector('.studio-sort-select').value = 'default');
    document.getElementById('studioFilterBar').style.display = r.length ? 'flex' : 'none';
    _renderStudioResults();
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Найти'; }
  }
}

function studioSetFilter(f, btn) {
  _studioFilter = f;
  document.querySelectorAll('.sfilter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  _renderStudioResults();
}

function studioSetSort(s) {
  _studioSort = s;
  _renderStudioResults();
}

function _getFilteredSorted() {
  let items = _studioResults.slice();
  if (_studioFilter !== 'all') items = items.filter(i => i.source === _studioFilter);
  if (_studioSort === 'duration_asc')  items.sort((a,b) => (a.duration||0) - (b.duration||0));
  if (_studioSort === 'duration_desc') items.sort((a,b) => (b.duration||0) - (a.duration||0));
  return items;
}

function _renderStudioResults() {
  const res = document.getElementById('studioResults');
  if (!res) return;
  const items = _getFilteredSorted();
  if (!items.length) { res.innerHTML = '<div class="empty"><div class="empty-text">Нет результатов</div></div>'; return; }
  // Передаём оригинальный индекс чтобы studioAddTrack работал правильно
  res.innerHTML = items.map(item => {
    const origIdx = _studioResults.indexOf(item);
    return buildStudioResult(item, origIdx);
  }).join('');
}

// ── Карточка результата ──────────────────────

function buildStudioResult(item, idx) {
  const dur    = item.duration ? fmtTime(item.duration) : '';
  const srcLabel = item.source === 'soundcloud' ? 'SC' : item.source === 'youtube' ? 'YT' : item.source.toUpperCase();
  const srcColor = item.source === 'soundcloud' ? '#f50' : item.source === 'youtube' ? '#f00' : '#888';
  const inArc  = item.in_archive;

  const thumb = item.thumbnail
    ? `<img src="${x(item.thumbnail)}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=srp></div>'" style="width:100%;height:100%;object-fit:cover;border-radius:var(--radius-sm)">`
    : `<div class="srp"></div>`;

  const addBtn = inArc
    ? `<div class="sr-action-btn sr-done" title="Уже в архиве">
         <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
       </div>`
    : `<button class="sr-action-btn sr-add" onclick="studioAddTrack(${idx})" title="Добавить">
         <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
       </button>`;

  const isPreview = _previewFileId === `preview_${idx}`;
  const previewBtn = `
    <button class="sr-preview-btn ${isPreview ? 'playing' : ''}" onclick="studioPreview(${idx},this)" title="Предпрослушка">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
        ${isPreview
          ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'
          : '<path d="M8 5v14l11-7z"/>'}
      </svg>
    </button>`;

  return `
    <div class="studio-result" id="sr_${idx}">
      <div class="studio-thumb">${thumb}</div>
      <div class="studio-result-info">
        <div class="studio-result-artist">${x(item.artist)}</div>
        <div class="studio-result-title">${x(item.title)}</div>
        <div class="studio-result-meta">
          <span style="color:${srcColor};font-weight:600;font-size:10px">${srcLabel}</span>
          ${dur ? `<span> · ${dur}</span>` : ''}
          ${inArc ? `<span style="color:var(--accent)"> · в архиве</span>` : ''}
        </div>
      </div>
      <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">
        ${previewBtn}
        ${addBtn}
      </div>
    </div>`;
}

// ── Предпрослушка ────────────────────────────

let _previewAudio = null;
let _previewIdx   = -1;

function studioPreview(idx, btn) {
  const item = _studioResults[idx];
  if (!item?.url) return;

  // Если уже играет этот — пауза
  if (_previewIdx === idx && _previewAudio && !_previewAudio.paused) {
    _previewAudio.pause();
    _previewIdx = -1;
    _previewFileId = null;
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
    btn.classList.remove('playing');
    return;
  }

  // Останавливаем предыдущее
  if (_previewAudio) { _previewAudio.pause(); _previewAudio.src = ''; }
  document.querySelectorAll('.sr-preview-btn').forEach(b => {
    b.classList.remove('playing');
    b.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
  });

  // Используем YouTube/SC URL напрямую через yt-dlp — но у нас нет прямого стрима
  // Поэтому предпрослушка идёт через наш бэкенд /studio/preview
  _previewIdx   = idx;
  _previewFileId = `preview_${idx}`;
  btn.classList.add('playing');
  btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>';

  _previewAudio = new Audio();
  _previewAudio.crossOrigin = 'anonymous';
  // Стримим через наш прокси-эндпоинт
  const previewUrl = `${BOT_API}/studio/preview?url=${encodeURIComponent(item.url)}`;
  const headers = { 'bypass-tunnel-reminder': '1' };

  // Fetch с авторизацией → blob URL
  fetch(previewUrl, { headers, signal: AbortSignal.timeout(15000) })
    .then(r => {
      if (!r.ok) throw new Error('preview failed');
      return r.blob();
    })
    .then(blob => {
      const url = URL.createObjectURL(blob);
      _previewAudio.src = url;
      _previewAudio.play().catch(() => {});
      _previewAudio.onended = () => {
        btn.classList.remove('playing');
        btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
        _previewIdx = -1;
        URL.revokeObjectURL(url);
      };
    })
    .catch(e => {
      btn.classList.remove('playing');
      btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
      toast('Предпрослушка недоступна');
      _previewIdx = -1;
    });
}

// ── Добавление трека ─────────────────────────

async function studioAddTrack(idx) {
  const item = _studioResults[idx];
  if (!item || item.in_archive) return;

  const row = document.getElementById(`sr_${idx}`);
  const btn = row?.querySelector('.sr-add');
  if (btn) { btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>'; btn.disabled = true; }

  const r = await studioApi('/studio/add', 'POST', { url: item.url, artist: item.artist, title: item.title });

  if (!r || r.error) {
    toast(r?.message || r?.error || 'Ошибка запуска');
    if (btn) { btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>'; btn.disabled = false; }
    return;
  }

  const job = { job_id: r.job_id, status: 'queued', step: '⏳ В очереди...', artist: item.artist, title: item.title, created_at: Date.now() };
  _studioJobs[r.job_id] = job;
  _startJobPoller(r.job_id);

  // Обновляем джобы
  const jobsArea = document.getElementById('studioJobsArea');
  if (jobsArea) {
    const cards = Object.values(_studioJobs).sort((a,b) => b.created_at - a.created_at).map(buildJobCard).join('');
    jobsArea.innerHTML = `<div class="section-title">Загрузки</div>${cards}`;
  }
  toast(`⬇️ ${item.artist} — ${item.title}`);
}

// ── Job cards ────────────────────────────────

function buildJobCard(job) {
  const statusClass = job.status === 'ready' ? 'ready' : job.status === 'error' ? 'error' : '';
  const pct = job.status === 'ready' ? 100 : job.status === 'error' ? 100 : _stepProgress(job.step);
  const publishBtn = job.status === 'ready'
    ? `<button class="job-publish-btn" onclick="openPlSheet('${job.job_id}')">Опубликовать</button>`
    : `<button class="job-publish-btn" disabled>Опубликовать</button>`;
  const dismissBtn = (job.status === 'ready' || job.status === 'error')
    ? `<button class="job-dismiss-btn" onclick="dismissJob('${job.job_id}')">✕</button>` : '';
  return `
    <div class="job-card ${statusClass}" id="job_${job.job_id}">
      <div class="job-card-header">
        <div class="job-card-info">
          <div class="job-card-artist">${x(job.artist)}</div>
          <div class="job-card-title">${x(job.title)}</div>
        </div>
      </div>
      <div class="job-step" id="jstep_${job.job_id}">${x(job.step)}</div>
      <div class="job-progress"><div class="job-progress-fill" id="jprog_${job.job_id}" style="width:${pct}%"></div></div>
      <div class="job-actions">${publishBtn}${dismissBtn}</div>
    </div>`;
}

function _stepProgress(step) {
  if (!step) return 10;
  if (step.includes('Скачива')) return 20;
  if (step.includes('метаданн')) return 40;
  if (step.includes('обложк'))  return 55;
  if (step.includes('MP3'))     return 70;
  if (step.includes('текст'))   return 85;
  if (step.includes('Telegram')) return 95;
  return 10;
}

function _startJobPoller(job_id) {
  if (_studioPollers[job_id]) return;
  _studioPollers[job_id] = setInterval(async () => {
    const r = await studioApi(`/studio/job/${job_id}`);
    if (!r || r.error) return;
    _studioJobs[job_id] = { ..._studioJobs[job_id], ...r };

    const stepEl = document.getElementById(`jstep_${job_id}`);
    const progEl = document.getElementById(`jprog_${job_id}`);
    const card   = document.getElementById(`job_${job_id}`);
    if (stepEl) stepEl.textContent = r.step || '';
    if (progEl) progEl.style.width = (r.status === 'ready' ? 100 : _stepProgress(r.step)) + '%';
    if (card) { card.classList.toggle('ready', r.status === 'ready'); card.classList.toggle('error', r.status === 'error'); }

    if (r.status === 'ready' || r.status === 'error') {
      clearInterval(_studioPollers[job_id]);
      delete _studioPollers[job_id];
      if (card) card.outerHTML = buildJobCard(_studioJobs[job_id]);
      if (r.status === 'ready') toast(`✅ ${r.artist} — ${r.title} готов!`);
      if (r.status === 'error') toast(`❌ ${r.error}`);
    }
  }, 2500);
}

function dismissJob(job_id) {
  clearInterval(_studioPollers[job_id]);
  delete _studioPollers[job_id];
  delete _studioJobs[job_id];
  document.getElementById(`job_${job_id}`)?.remove();
  const jobsArea = document.getElementById('studioJobsArea');
  if (jobsArea && !Object.keys(_studioJobs).length) jobsArea.innerHTML = '';
}

function openPlSheet(job_id) {
  _plSheetJobId = job_id;
  const opts = document.getElementById('plSheetOptions');
  opts.innerHTML =
    `<button class="pl-option" onclick="publishJob(null)"><span>📤</span><span style="flex:1">Без плейлиста</span></button>` +
    (playlists || []).map(pl => `

        <span class="pl-option-count">${pl.track_count}</span>

  document.getElementById('plSheet').classList.add('show');
}

function closePlSheet() {
  document.getElementById('plSheet').classList.remove('show');
  _plSheetJobId = null;
}

async function publishJob(playlist_id) {
  const job_id = _plSheetJobId;
  closePlSheet();
  if (!job_id) return;
  toast('📤 Публикую...');
  const r = await studioApi('/studio/publish', 'POST', { job_id, playlist_id });

    toast(r.message || '✅ Опубликовано!');
    dismissJob(job_id);
    playlists = await api('/playlists') || playlists;
  } else {
    toast(`❌ ${r?.error || 'Ошибка публикации'}`);

// ── Studio API helper ────────────────────────

async function studioApi(path, method = 'GET', body = null) {
  if (!BOT_API) { toast('Нет подключения к серверу'); return null; }
  try {
    const opts = {
      method,
      headers: { 'Content-Type': 'application/json', 'bypass-tunnel-reminder': '1' },
      signal: AbortSignal.timeout(60000),
    };
    if (body) opts.body = JSON.stringify(body);
    const r = await fetch(`${BOT_API}${path}`, opts);
    return await r.json();
  } catch(e) { console.warn('studioApi:', e); return null; }
}

async function renderStudio(el) {
  const jobCards = Object.values(_studioJobs)
    .sort((a, b) => b.created_at - a.created_at)
    .map(j => buildJobCard(j))
    .join('');

  const resultsHtml = _studioResults.length
    ? _studioResults.map(buildStudioResult).join('')
    : '<div class="search-hint">Введи запрос чтобы найти треки на SoundCloud / YouTube</div>';

  el.innerHTML = `
    <div class="studio-search-wrap">
      <input class="studio-search-input" id="studioQ" type="search"
             placeholder="Артист — Название..." autocomplete="off"
             onkeydown="if(event.key==='Enter')studioDoSearch()">
      <button class="studio-search-btn" id="studioBtn" onclick="studioDoSearch()">Найти</button>
    </div>
    ${jobCards ? `<div class="section-title">Активные загрузки</div>${jobCards}` : ''}
    <div id="studioResults">${_studioResults.length ? '<div class="section-title">Результаты</div>' + resultsHtml : resultsHtml}</div>`;
}

async function studioDoSearch() {
  const q = (document.getElementById('studioQ')?.value || '').trim();
  if (!q) return;
  const btn = document.getElementById('studioBtn');
  const res = document.getElementById('studioResults');
  if (btn) btn.disabled = true;
  if (res) res.innerHTML = '<div class="loading"><div class="spinner"></div><span>Ищу на SoundCloud / YouTube...</span></div>';

  try {
    const r = await studioApi(`/studio/search?q=${encodeURIComponent(q)}&limit=10`);
    if (!r || r.error) {
      if (res) res.innerHTML = `<div class="empty"><div class="empty-text">${r?.error || 'Ошибка'}</div></div>`;
      return;
    }
    _studioResults = r;
    if (res) {
      res.innerHTML = r.length
        ? `<div class="section-title">${r.length} результатов</div>` + r.map(buildStudioResult).join('')
        : '<div class="empty"><div class="empty-text">Ничего не найдено</div></div>';
    }
  } finally {
    if (btn) btn.disabled = false;
  }
}

function buildStudioResult(item, idx) {
  const dur = item.duration ? fmtTime(item.duration) : '';
  const src = item.source === 'soundcloud' ? '☁️ SC' : item.source === 'youtube' ? '▶️ YT' : item.source;

  const thumb = item.thumbnail
    ? `<img src="${x(item.thumbnail)}" loading="lazy" onerror="this.remove()">`
    : `<svg width="18" height="18" viewBox="0 0 24 24" fill="var(--text3)"><path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/></svg>`;
  return `
    <div class="studio-result" id="sr_${idx}">
      <div class="studio-thumb">${thumb}</div>
      <div class="studio-result-info">
        <div class="studio-result-artist">${x(item.artist)}</div>
        <div class="studio-result-title">${x(item.title)}</div>
        <div class="studio-result-meta">${[src, dur].filter(Boolean).join(' · ')}</div>

async function studioAddTrack(idx) {
  const item = _studioResults[idx];
  if (!item || item.in_archive) return;

  // Помечаем кнопку как загружающуюся
  const row = document.getElementById(`sr_${idx}`);

    url:    item.url,
    artist: item.artist,

  if (!r || r.error) {
    toast(r?.message || r?.error || 'Ошибка запуска');

  // Стартуем job

    job_id:     r.job_id,
