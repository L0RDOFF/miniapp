<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Music Archive</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
    body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        background: #0f0f0f;
        color: white;
    }

    header {
        padding: 16px;
        font-size: 20px;
        font-weight: bold;
        text-align: center;
        border-bottom: 1px solid #222;
    }

    .search-box {
        padding: 16px;
    }

    input {
        width: 100%;
        padding: 12px;
        border-radius: 12px;
        border: none;
        font-size: 16px;
        background: #1e1e1e;
        color: white;
    }

    .tracks {
        padding: 16px;
    }

    .track {
        padding: 12px;
        margin-bottom: 10px;
        background: #1a1a1a;
        border-radius: 12px;
        cursor: pointer;
        transition: 0.2s;
    }

    .track:hover {
        background: #262626;
    }

    .title {
        font-weight: bold;
    }

    .artist {
        opacity: 0.7;
        font-size: 14px;
    }

    .loading {
        text-align: center;
        padding: 20px;
        opacity: 0.6;
    }
</style>
</head>
<body>

<header>🎵 Music Archive</header>

<div class="search-box">
    <input type="text" id="searchInput" placeholder="Поиск треков..." />
</div>

<div class="tracks" id="tracks"></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // ⚠ ВАЖНО: замени на URL своего API
    const BOT_API = "https://your-api-url.com";

    const searchInput = document.getElementById("searchInput");
    const tracksContainer = document.getElementById("tracks");

    async function searchTracks(query) {
        if (!query) {
            tracksContainer.innerHTML = "";
            return;
        }

        tracksContainer.innerHTML = '<div class="loading">Поиск...</div>';

        try {
            const response = await fetch(`${BOT_API}/search?q=${encodeURIComponent(query)}`);
            const data = await response.json();

            renderTracks(data);
        } catch (error) {
            tracksContainer.innerHTML = '<div class="loading">Ошибка загрузки</div>';
        }
    }

    function renderTracks(tracks) {
        tracksContainer.innerHTML = "";

        if (!tracks || tracks.length === 0) {
            tracksContainer.innerHTML = '<div class="loading">Ничего не найдено</div>';
            return;
        }

        tracks.forEach(track => {
            const div = document.createElement("div");
            div.className = "track";
            div.innerHTML = `
                <div class="title">${track.title}</div>
                <div class="artist">${track.artist}</div>
            `;

            div.onclick = () => {
                tg.openLink(track.url);
            };

            tracksContainer.appendChild(div);
        });
    }

    searchInput.addEventListener("input", (e) => {
        const value = e.target.value.trim();
        searchTracks(value);
    });
</script>

</body>
</html>
