<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Music Archive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #080808;
  --surface: #111111;
  --surface2: #1a1a1a;
  --surface3: #242424;
  --accent: #c8f53a;
  --accent-dim: rgba(200,245,58,0.15);
  --accent-glow: rgba(200,245,58,0.25);
  --text: #f0f0f0;
  --text2: #888;
  --text3: #444;
  --radius: 16px;
  --radius-sm: 10px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
.header {
  position: sticky; top: 0; z-index: 200;
  padding: 14px 20px 10px;
  background: rgba(8,8,8,0.92);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid rgba(255,255,255,0.05);
  display: flex; align-items: center; gap: 12px;
}
.logo {
  font-family: 'Unbounded', sans-serif;
  font-size: 15px; font-weight: 800;
  letter-spacing: -0.3px;
  flex: 1;
}
.logo em { color: var(--accent); font-style: normal; }

.search-wrap {
  flex: 1;
  display: flex; align-items: center; gap: 10px;
  background: var(--surface2);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 100px;
  padding: 0 14px;
  height: 38px;
  transition: border-color 0.2s;
}
.search-wrap:focus-within { border-color: var(--accent); }
.search-icon { color: var(--text3); font-size: 14px; flex-shrink: 0; }
.search-input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text); font-size: 14px; font-family: 'Inter', sans-serif;
}
.search-input::placeholder { color: var(--text3); }
.search-clear {
  background: none; border: none; color: var(--text3);
  font-size: 16px; cursor: pointer; padding: 0; line-height: 1;
  display: none;
}
.search-clear.visible { display: block; }

.icon-btn {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--surface2); border: none;
  color: var(--text); font-size: 16px;
  cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.icon-btn:active { background: var(--surface3); }

/* ── TABS ── */
.tabs-wrap {
  padding: 12px 20px 0;
  overflow-x: auto; scrollbar-width: none;
  display: flex; gap: 6px;
}
.tabs-wrap::-webkit-scrollbar { display: none; }
.tab {
  padding: 7px 16px;
  border-radius: 100px; border: none;
  font-size: 12px; font-weight: 600; font-family: 'Inter', sans-serif;
  white-space: nowrap; cursor: pointer;
  background: var(--surface2); color: var(--text2);
  transition: all 0.2s;
  letter-spacing: 0.2px;
}
.tab.active { background: var(--accent); color: #000; }

/* ── CONTENT ── */
.content {
  padding: 16px 20px 100px;
}

/* ── SECTION HEADER ── */
.section-title {
  font-family: 'Unbounded', sans-serif;
  font-size: 13px; font-weight: 600;
  letter-spacing: 0.5px; text-transform: uppercase;
  color: var(--text2); margin: 20px 0 12px;
}
.section-title:first-child { margin-top: 4px; }

/* ── HERO BANNER ── */
.hero {
  background: linear-gradient(135deg, #111 0%, #1a1a0a 50%, #0f1a00 100%);
  border-radius: var(--radius);
  padding: 24px 20px;
  margin-bottom: 4px;
  border: 1px solid rgba(200,245,58,0.1);
  position: relative; overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute; top: -40px; right: -40px;
  width: 160px; height: 160px;
  background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
  pointer-events: none;
}
.hero-label {
  font-size: 11px; font-weight: 600;
  color: var(--accent); letter-spacing: 1px; text-transform: uppercase;
  margin-bottom: 8px;
}
.hero-title {
  font-family: 'Unbounded', sans-serif;
  font-size: 22px; font-weight: 800; line-height: 1.2;
  margin-bottom: 6px;
}
.hero-sub { font-size: 13px; color: var(--text2); }

/* ── PLAYLIST CARDS ── */
.playlists-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 10px; margin-bottom: 8px;
}
.playlist-card {
  background: var(--surface);
  border-radius: var(--radius);
  overflow: hidden; cursor: pointer;
  border: 1px solid rgba(255,255,255,0.04);
  transition: transform 0.15s, border-color 0.15s;
}
.playlist-card:active { transform: scale(0.97); border-color: var(--accent); }
.playlist-cover {
  width: 100%; aspect-ratio: 1;
  background: linear-gradient(135deg, #1a1a0a, #0f1a00);
  display: flex; align-items: center; justify-content: center;
  font-size: 42px; position: relative; overflow: hidden;
}
.playlist-cover img { width: 100%; height: 100%; object-fit: cover; }
.playlist-cover-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 60%);
}
.playlist-info { padding: 10px 12px 12px; }
.playlist-name {
  font-size: 13px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 3px;
}
.playlist-count { font-size: 11px; color: var(--text3); }

/* ── TRACK ROW ── */
.track-item {
  display: flex; align-items: center; gap: 12px;
  padding: 9px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  cursor: pointer;
}
.track-item:last-child { border-bottom: none; }
.track-item:active .track-title { color: var(--accent); }

.track-num {
  width: 20px; text-align: center;
  font-size: 12px; color: var(--text3);
  flex-shrink: 0;
}
.track-cover {
  width: 46px; height: 46px; border-radius: var(--radius-sm);
  background: var(--surface2); flex-shrink: 0;
  overflow: hidden; display: flex; align-items: center; justify-content: center;
  font-size: 18px; color: var(--text3);
}
.track-cover img { width: 100%; height: 100%; object-fit: cover; }
.track-info { flex: 1; min-width: 0; }
.track-artist {
  font-size: 11px; color: var(--text2); margin-bottom: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.track-title {
  font-size: 14px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  transition: color 0.15s;
}
.track-badge {
  font-size: 10px; color: var(--text3); margin-top: 2px;
}
.track-fav {
  background: none; border: none;
  font-size: 16px; cursor: pointer; padding: 6px;
  opacity: 0.5; transition: opacity 0.2s, transform 0.15s;
  flex-shrink: 0;
}
.track-fav.on { opacity: 1; }
.track-fav:active { transform: scale(1.3); }

/* ── PLAYLIST DETAIL ── */
.detail-view { display: none; }
.detail-view.show { display: block; }

.detail-header {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 20px;
  position: sticky; top: 60px; z-index: 100;
  background: rgba(8,8,8,0.92);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
}
.back-btn {
  background: var(--surface2); border: none;
  width: 34px; height: 34px; border-radius: 50%;
  color: var(--text); font-size: 16px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.detail-title {
  font-family: 'Unbounded', sans-serif;
  font-size: 14px; font-weight: 700;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.detail-hero {
  padding: 0 20px 20px;
  display: flex; gap: 16px; align-items: flex-end;
}
.detail-cover {
  width: 110px; height: 110px; border-radius: var(--radius);
  background: linear-gradient(135deg, #1a1a0a, #0f1a00);
  flex-shrink: 0; overflow: hidden;
  display: flex; align-items: center; justify-content: center; font-size: 44px;
}
.detail-cover img { width: 100%; height: 100%; object-fit: cover; }
.detail-info {}
.detail-name {
  font-family: 'Unbounded', sans-serif;
  font-size: 18px; font-weight: 800; margin-bottom: 6px; line-height: 1.2;
}
.detail-desc { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
.detail-count { font-size: 11px; color: var(--text3); }

.detail-btns {
  display: flex; gap: 10px; padding: 0 20px 16px;
}
.btn-primary {
  flex: 1; height: 44px; border-radius: 100px;
  background: var(--accent); border: none;
  color: #000; font-size: 14px; font-weight: 700; font-family: 'Inter', sans-serif;
  cursor: pointer;
}
.btn-secondary {
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--surface2); border: none;
  color: var(--text); font-size: 18px; cursor: pointer;
}

/* ── SEARCH VIEW ── */
.search-view { display: none; }
.search-view.show { display: block; }
.search-hint {
  text-align: center; padding: 40px 20px;
  color: var(--text3); font-size: 13px;
}

/* ── LOADING & EMPTY ── */
.loading {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 60px 20px; gap: 14px;
  color: var(--text3); font-size: 13px;
}
.spinner {
  width: 28px; height: 28px;
  border: 2px solid var(--surface3);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.empty {
  text-align: center; padding: 56px 20px;
  color: var(--text3);
}
.empty-icon { font-size: 44px; margin-bottom: 10px; opacity: 0.5; }
.empty-text { font-size: 14px; line-height: 1.5; }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 300;
  display: flex;
  background: rgba(8,8,8,0.96);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-top: 1px solid rgba(255,255,255,0.05);
  padding-bottom: env(safe-area-inset-bottom, 8px);
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 4px; padding: 10px 0 6px;
  background: none; border: none;
  color: var(--text3); cursor: pointer;
  font-size: 9px; font-family: 'Inter', sans-serif;
  font-weight: 500; letter-spacing: 0.3px;
  text-transform: uppercase;
  transition: color 0.2s;
}
.nav-btn.active { color: var(--accent); }
.nav-btn .ico { font-size: 20px; line-height: 1; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: var(--surface3); color: var(--text);
  padding: 10px 18px; border-radius: 100px;
  font-size: 13px; font-weight: 500;
  opacity: 0; transition: opacity 0.3s;
  pointer-events: none; white-space: nowrap; z-index: 999;
}
.toast.show { opacity: 1; }

/* ── STATS PILL ── */
.stats-row {
  display: flex; gap: 8px; margin-bottom: 4px;
}
.stat-pill {
  padding: 6px 14px;
  background: var(--surface2);
  border-radius: 100px; border: 1px solid rgba(255,255,255,0.05);
  font-size: 12px; color: var(--text2);
}
.stat-pill strong { color: var(--accent); font-weight: 700; }

</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo" id="headerLogo">Music <em>Archive</em></div>
  <div class="search-wrap" id="searchWrap" style="display:none;">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="searchInput" placeholder="Артист, трек..."
           autocomplete="off" oninput="handleSearch(this.value)">
    <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
  </div>
  <button class="icon-btn" id="searchToggleBtn" onclick="toggleSearch()">🔍</button>
</div>

<!-- MAIN CONTENT -->
<div id="mainView">
  <!-- TABS -->
  <div class="tabs-wrap" id="tabsWrap">
    <button class="tab active" onclick="switchTab('home',this)">Главная</button>
    <button class="tab" onclick="switchTab('playlists',this)">Плейлисты</button>
    <button class="tab" onclick="switchTab('recent',this)">Новинки</button>
    <button class="tab" onclick="switchTab('favorites',this)">Избранное</button>
  </div>
  <div class="content" id="tabContent">
    <div class="loading"><div class="spinner"></div>Загружаю архив...</div>
  </div>
</div>

<!-- SEARCH VIEW -->
<div id="searchView" class="search-view">
  <div class="content" id="searchContent">
    <div class="search-hint">Введи запрос для поиска</div>
  </div>
</div>

<!-- PLAYLIST DETAIL VIEW -->
<div id="detailView" class="detail-view">
  <div class="detail-header">
    <button class="back-btn" onclick="closeDetail()">←</button>
    <div class="detail-title" id="detailTitleBar"></div>
  </div>
  <div id="detailContent"></div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" id="nav-home" onclick="showSection('home')">
    <span class="ico">🏠</span>Главная
  </button>
  <button class="nav-btn" id="nav-playlists" onclick="showSection('playlists')">
    <span class="ico">📂</span>Плейлисты
  </button>
  <button class="nav-btn" id="nav-recent" onclick="showSection('recent')">
    <span class="ico">🆕</span>Новинки
  </button>
  <button class="nav-btn" id="nav-favorites" onclick="showSection('favorites')">
    <span class="ico">❤️</span>Избранное
  </button>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════

// Замени на адрес своего сервера: http://IP:8080
// Если бот запущен локально с ngrok: https://xxxx.ngrok.io
const BOT_API = 'https://adipex-memo-warehouse-california.trycloudflare.com';

const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); tg.enableClosingConfirmation(); }

const USER_ID = tg?.initDataUnsafe?.user?.id || 0;

let allTracks   = [];
let playlists   = [];
let favorites   = new Set(JSON.parse(localStorage.getItem('mab_favs') || '[]'));
let currentTab  = 'home';
let searchTimer = null;


// ══════════════════════════════════════════════
//  API
// ══════════════════════════════════════════════

async function api(path) {
  try {
    const sep = path.includes('?') ? '&' : '?';
    const r = await fetch(`${BOT_API}${path}${sep}user_id=${USER_ID}`, {
      signal: AbortSignal.timeout(8000)
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return await r.json();
  } catch(e) {
    console.warn('API error:', e.message);
    return null;
  }
}


// ══════════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════════

function showSection(tab) {
  closeSearch();
  closeDetail();
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`nav-${tab}`)?.classList.add('active');
  switchTab(tab, null);
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (btn) btn.classList.add('active');
  else {
    const tabs = ['home','playlists','recent','favorites'];
    document.querySelectorAll('.tab')[tabs.indexOf(tab)]?.classList.add('active');
  }
  currentTab = tab;
  loadTab(tab);
}

async function loadTab(tab) {
  const el = document.getElementById('tabContent');
  el.innerHTML = '<div class="loading"><div class="spinner"></div>Загружаю...</div>';
  if      (tab === 'home')      await renderHome(el);
  else if (tab === 'playlists') await renderPlaylists(el);
  else if (tab === 'recent')    await renderRecent(el);
  else if (tab === 'favorites') await renderFavorites(el);
}


// ══════════════════════════════════════════════
//  HOME
// ══════════════════════════════════════════════

async function renderHome(el) {
  const [pls, recent] = await Promise.all([
    api('/playlists'), api('/tracks/recent?limit=20')
  ]);

  playlists = pls || [];
  allTracks = recent || [];

  if (!playlists.length && !allTracks.length) {
    el.innerHTML = empty('🎵', 'Архив пуст — добавляй треки через бота');
    return;
  }

  let html = `
    <div class="hero">
      <div class="hero-label">Твой архив</div>
      <div class="hero-title">Music<br>Archive</div>
      <div class="hero-sub">${allTracks.length ? `${allTracks.length}+ треков в архиве` : 'Начни добавлять треки'}</div>
    </div>
  `;

  if (playlists.length) {
    html += `<div class="section-title">Плейлисты</div><div class="playlists-grid">`;
    playlists.forEach(pl => { html += playlistCard(pl); });
    html += `</div>`;
  }

  if (allTracks.length) {
    html += `<div class="section-title">Последние добавления</div>`;
    allTracks.slice(0, 12).forEach((t, i) => { html += trackRow(t, i + 1); });
  }

  el.innerHTML = html;
}


// ══════════════════════════════════════════════
//  PLAYLISTS
// ══════════════════════════════════════════════

async function renderPlaylists(el) {
  if (!playlists.length) {
    const pls = await api('/playlists');
    playlists = pls || [];
  }
  if (!playlists.length) {
    el.innerHTML = empty('📂', 'Плейлистов пока нет');
    return;
  }
  let html = `<div class="section-title">Все плейлисты</div><div class="playlists-grid">`;
  playlists.forEach(pl => { html += playlistCard(pl); });
  html += `</div>`;
  el.innerHTML = html;
}


// ══════════════════════════════════════════════
//  RECENT
// ══════════════════════════════════════════════

async function renderRecent(el) {
  const tracks = await api('/tracks/recent?limit=50');
  if (!tracks?.length) { el.innerHTML = empty('🆕', 'Треков пока нет'); return; }
  let html = `<div class="section-title">${tracks.length} треков</div>`;
  tracks.forEach((t, i) => { html += trackRow(t, i + 1); });
  el.innerHTML = html;
}


// ══════════════════════════════════════════════
//  FAVORITES
// ══════════════════════════════════════════════

async function renderFavorites(el) {
  if (!favorites.size) { el.innerHTML = empty('❤️', 'Нажми ❤️ на треке чтобы добавить в избранное'); return; }
  const tracks = await api('/tracks/recent?limit=100');
  if (!tracks) { el.innerHTML = empty('❤️', 'Ошибка загрузки'); return; }
  const favs = tracks.filter(t => favorites.has(t.file_id));
  if (!favs.length) { el.innerHTML = empty('❤️', 'Треки не найдены'); return; }
  let html = `<div class="section-title">${favs.length} треков</div>`;
  favs.forEach((t, i) => { html += trackRow(t, i + 1); });
  el.innerHTML = html;
}


// ══════════════════════════════════════════════
//  PLAYLIST DETAIL
// ══════════════════════════════════════════════

async function openPlaylist(id) {
  const pl = playlists.find(p => p.id === id) || { name: '...', id };
  document.getElementById('mainView').style.display = 'none';
  document.getElementById('searchView').classList.remove('show');

  const dv = document.getElementById('detailView');
  dv.classList.add('show');
  document.getElementById('detailTitleBar').textContent = pl.name;

  const content = document.getElementById('detailContent');
  content.innerHTML = '<div class="loading"><div class="spinner"></div>Загружаю...</div>';

  const data = await api(`/playlists/${id}/tracks?limit=100`);

  let html = `
    <div class="detail-hero">
      <div class="detail-cover">
        ${pl.cover ? `<img src="${x(pl.cover)}" loading="lazy">` : '🎵'}
      </div>
      <div class="detail-info">
        <div class="detail-name">${x(pl.name)}</div>
        ${pl.description ? `<div class="detail-desc">${x(pl.description)}</div>` : ''}
        <div class="detail-count">${data?.total || 0} треков</div>
      </div>
    </div>
    <div class="detail-btns">
      <button class="btn-primary" onclick="playRandom(${id})">▶ Случайный</button>
      <button class="btn-secondary" onclick="playRandom(${id})">🔀</button>
    </div>
    <div style="padding: 0 20px 20px;">
  `;

  if (data?.tracks?.length) {
    data.tracks.forEach((t, i) => { html += trackRow(t, i + 1); });
  } else {
    html += empty('📂', 'Плейлист пуст');
  }
  html += '</div>';
  content.innerHTML = html;
}

function closeDetail() {
  document.getElementById('detailView').classList.remove('show');
  document.getElementById('mainView').style.display = 'block';
}

async function playRandom(plId) {
  const data = await api(`/tracks/random?playlist_id=${plId}`);
  if (data?.file_id) playTrack(data);
  else toast('Плейлист пуст');
}


// ══════════════════════════════════════════════
//  SEARCH
// ══════════════════════════════════════════════

let searchOpen = false;

function toggleSearch() {
  if (searchOpen) { clearSearch(); return; }
  searchOpen = true;
  document.getElementById('headerLogo').style.display = 'none';
  document.getElementById('searchWrap').style.display = 'flex';
  document.getElementById('searchToggleBtn').style.display = 'none';
  document.getElementById('searchInput').focus();

  document.getElementById('mainView').style.display = 'none';
  document.getElementById('detailView').classList.remove('show');
  document.getElementById('searchView').classList.add('show');
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').classList.remove('visible');
  document.getElementById('searchContent').innerHTML = '<div class="search-hint">Введи запрос для поиска</div>';
}

function closeSearch() {
  if (!searchOpen) return;
  searchOpen = false;
  clearSearch();
  document.getElementById('headerLogo').style.display = 'block';
  document.getElementById('searchWrap').style.display = 'none';
  document.getElementById('searchToggleBtn').style.display = 'flex';
  document.getElementById('searchView').classList.remove('show');
  document.getElementById('mainView').style.display = 'block';
}

function handleSearch(q) {
  document.getElementById('searchClear').classList.toggle('visible', q.length > 0);
  clearTimeout(searchTimer);
  if (!q.trim()) {
    document.getElementById('searchContent').innerHTML = '<div class="search-hint">Введи запрос для поиска</div>';
    return;
  }
  searchTimer = setTimeout(() => doSearch(q.trim()), 350);
}

async function doSearch(q) {
  const el = document.getElementById('searchContent');
  el.innerHTML = '<div class="loading"><div class="spinner"></div>Ищу...</div>';

  const tracks = await api(`/tracks/search?q=${encodeURIComponent(q)}&limit=50`);

  if (!tracks) {
    el.innerHTML = empty('⚡', 'Нет подключения к серверу бота');
    return;
  }
  if (!tracks.length) {
    el.innerHTML = empty('🔍', `Ничего не найдено по запросу «${x(q)}»`);
    return;
  }

  let html = `<div class="section-title">${tracks.length} результатов</div>`;
  tracks.forEach((t, i) => { html += trackRow(t, i + 1); });
  el.innerHTML = html;
}


// ══════════════════════════════════════════════
//  TRACK ACTIONS
// ══════════════════════════════════════════════

function playTrack(t) {
  if (tg) {
    tg.sendData(JSON.stringify({ action: 'play', file_id: t.file_id }));
  } else {
    toast(`▶ ${t.artist} — ${t.title}`);
  }
}

function toggleFav(fileId, btn) {
  if (favorites.has(fileId)) {
    favorites.delete(fileId);
    btn.textContent = '🤍';
    btn.classList.remove('on');
    toast('Удалено из избранного');
  } else {
    favorites.add(fileId);
    btn.textContent = '❤️';
    btn.classList.add('on');
    toast('Добавлено в избранное');
  }
  localStorage.setItem('mab_favs', JSON.stringify([...favorites]));
}


// ══════════════════════════════════════════════
//  COMPONENTS
// ══════════════════════════════════════════════

function playlistCard(pl) {
  return `
    <div class="playlist-card" onclick="openPlaylist(${pl.id})">
      <div class="playlist-cover">
        ${pl.cover ? `<img src="${x(pl.cover)}" loading="lazy">` : '🎵'}
        <div class="playlist-cover-overlay"></div>
      </div>
      <div class="playlist-info">
        <div class="playlist-name">${x(pl.name)}</div>
        <div class="playlist-count">${pl.track_count} треков</div>
      </div>
    </div>`;
}

function trackRow(t, num) {
  const isFav = favorites.has(t.file_id);
  const badge = [t.year, t.genre].filter(Boolean).join(' · ');
  const safeId = x(t.file_id);
  return `
    <div class="track-item" onclick="playTrack(${JSON.stringify(t).replace(/"/g,'&quot;')})">
      <div class="track-num">${num}</div>
      <div class="track-cover">
        ${t.cover ? `<img src="${x(t.cover)}" loading="lazy">` : '♪'}
      </div>
      <div class="track-info">
        <div class="track-artist">${x(t.artist)}</div>
        <div class="track-title">${x(t.title)}</div>
        ${badge ? `<div class="track-badge">${x(badge)}</div>` : ''}
      </div>
      <button class="track-fav ${isFav?'on':''}"
              onclick="event.stopPropagation();toggleFav('${safeId}',this)">
        ${isFav ? '❤️' : '🤍'}
      </button>
    </div>`;
}

function empty(icon, text) {
  return `<div class="empty"><div class="empty-icon">${icon}</div><div class="empty-text">${text}</div></div>`;
}

// ── TOAST ──
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

// ── XSS ESCAPE ──
function x(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}


// ── INIT ──
loadTab('home');
</script>
